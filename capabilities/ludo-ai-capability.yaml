naftiko: 1.0.0-alpha2
info:
  label: Ludo.ai REST API
  description: The Ludo.ai REST API provides programmatic access to AI-powered game asset generation capabilities. Developers
    can generate sprites, icons, UI assets, textures, and backgrounds through image generation endpoints, edit existing images
    with text instructions, convert 2D images to 3D GLB models with PBR textures, create animated spritesheets from static
    images, produce sound effects, music tracks, character voices, and generate short videos. All API requests require an
    API key passed via the Authentication header, and requests consume credits that vary by endpoint type. The API is currently
    in be
  tags:
  - Ludo
  - Ai
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: ludo-ai
    baseUri: https://api.ludo.ai/api
    description: Ludo.ai REST API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authentication
      value: '{{LUDO_AI_TOKEN}}'
    resources:
    - name: images-create
      path: /images/create
      operations:
      - name: createimage
        method: POST
        description: Ludo.ai Generate a game-ready image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: images-edit
