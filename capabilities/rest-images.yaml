naftiko: 1.0.0-alpha2
info:
  label: Ludo.ai REST API — Images
  description: 'Ludo.ai REST API — Images. 5 operations. Lead operation: Ludo.ai Generate a game-ready image. Self-contained
    Naftiko capability covering one Ludo Ai business surface.'
  tags:
  - Ludo Ai
  - Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LUDO_AI_API_KEY: LUDO_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-images
    baseUri: https://api.ludo.ai/api
    description: Ludo.ai REST API — Images business capability. Self-contained, no shared references.
    resources:
    - name: images-create
      path: /images/create
      operations:
      - name: createimage
        method: POST
        description: Ludo.ai Generate a game-ready image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-edit
      path: /images/edit
      operations:
      - name: editimage
        method: POST
        description: Ludo.ai Edit an existing image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-generate-pose
      path: /images/generate-pose
      operations:
      - name: generatepose
        method: POST
        description: Ludo.ai Generate a new pose for an existing sprite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-generate-with-style
      path: /images/generate-with-style
      operations:
      - name: generatewithstyle
        method: POST
        description: Ludo.ai Generate an image matching a reference style
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: images-remove-background
      path: /images/remove-background
      operations:
      - name: removeimagebackground
        method: POST
        description: Ludo.ai Remove background from an image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authentication
      value: '{{env.LUDO_AI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-images-rest
    port: 8080
    description: REST adapter for Ludo.ai REST API — Images. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/images/create
      name: images-create
      description: REST surface for images-create.
      operations:
      - method: POST
        name: createimage
        description: Ludo.ai Generate a game-ready image
        call: rest-images.createimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/edit
      name: images-edit
      description: REST surface for images-edit.
      operations:
      - method: POST
        name: editimage
        description: Ludo.ai Edit an existing image
        call: rest-images.editimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/generate-pose
      name: images-generate-pose
      description: REST surface for images-generate-pose.
      operations:
      - method: POST
        name: generatepose
        description: Ludo.ai Generate a new pose for an existing sprite
        call: rest-images.generatepose
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/generate-with-style
      name: images-generate-with-style
      description: REST surface for images-generate-with-style.
      operations:
      - method: POST
        name: generatewithstyle
        description: Ludo.ai Generate an image matching a reference style
        call: rest-images.generatewithstyle
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/images/remove-background
      name: images-remove-background
      description: REST surface for images-remove-background.
      operations:
      - method: POST
        name: removeimagebackground
        description: Ludo.ai Remove background from an image
        call: rest-images.removeimagebackground
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ludo.ai REST API — Images. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: ludo-ai-generate-game-ready-image
      description: Ludo.ai Generate a game-ready image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-images.createimage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ludo-ai-edit-existing-image
      description: Ludo.ai Edit an existing image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-images.editimage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ludo-ai-generate-new-pose-existing
      description: Ludo.ai Generate a new pose for an existing sprite
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-images.generatepose
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ludo-ai-generate-image-matching-reference
      description: Ludo.ai Generate an image matching a reference style
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-images.generatewithstyle
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ludo-ai-remove-background-image
      description: Ludo.ai Remove background from an image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-images.removeimagebackground
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
