specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ludo.ai
providerId: ludo-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Generative AI
  - Game Development
description: 'FOCUS-aligned FinOps for Ludo.ai: tiered annual subscription with upfront credit allotments
  consumed by asset generation; annual billing carries a 30-35% discount; API/MCP usage is gated by
  per-tier concurrency.'
sources:
  - https://ludo.ai/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ludo.ai
serviceCategory: AI Infrastructure
billingModel:
  pricingCategory: Subscription + Prepaid Credits
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Refund
focusColumns:
  ServiceName: Ludo.ai
  ServiceCategory: AI Infrastructure
  ProviderName: Ludo.ai
  PublisherName: Ludo.ai
  InvoiceIssuerName: Ludo.ai
  BillingCurrency: USD
meters:
  - name: subscription_fee
    unit: year
    aggregation: sum
    dimensions:
      - tier
  - name: credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - asset_type
      - api
  - name: assets_generated
    unit: asset
    aggregation: sum
    dimensions:
      - asset_type
  - name: seats
    unit: seat
    aggregation: max
    dimensions:
      - tier
  - name: top_up_credits
    unit: credit
    aggregation: sum
principles:
  - name: Visibility
    description: Track annual credit burn against the per-tier allotment in the Ludo.ai dashboard;
      monitor concurrent-request saturation on Pro/Studio.
  - name: Allocation
    description: Tag generated assets by project; map projects to internal product/team for chargeback.
  - name: Optimization
    description: Prefer annual billing for the 30-35% saving; right-size between Indie / Pro / Studio
      based on annual credit need; use Top Up rather than upgrading mid-cycle.
  - name: Accountability
    description: Owners review credit burn quarterly; trigger Studio upgrade before Pro credits exhaust;
      track refund-window thresholds at renewal.
