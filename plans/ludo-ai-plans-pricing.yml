providerId: ludo-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Asset Generation
  - Game Development
  - Generative AI
description: Ludo.ai prices via four credit-based subscription tiers — Indie, Pro, Studio, Enterprise.
  Credits are upfront annual allotments consumed by asset generation; annual billing saves 30-35% vs.
  monthly. API and MCP access begin at the Pro tier with concurrent-request limits per tier. Top-up
  credit purchases are available on monthly plans.
sources:
  - https://ludo.ai/pricing
plans:
  - id: ludo-ai-indie
    name: Indie
    type: subscription
    description: $20/month or $15/month annual ($180/yr). 3,000 credits/year, 1 seat, 5 active projects, basic support.
    entries:
      - label: Annual subscription
        name: subscription_annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '180.00'
        userMultiplied: false
      - label: Monthly subscription
        name: subscription_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: false
      - label: Annual credits
        name: credits_annual
        type: quota
        metric: credits
        limit: 3000
        timeFrame: year
        geo: global
        unit: 1
        price: '0.00'
