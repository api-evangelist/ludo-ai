specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ludo.ai
providerId: ludo-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Generative AI
  - Game Development
description: Ludo.ai rate limits are expressed primarily as concurrent-request limits per plan and an
  annual credit allotment that gates total throughput. API/MCP access starts at the Pro tier (1 concurrent
  request); Studio raises this to 5; Enterprise is custom.
sources:
  - https://ludo.ai/pricing
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: API/MCP concurrent requests (Indie)
    scope: account
    metric: concurrent_requests
    limit: 0
    notes: API/MCP access not included on Indie tier.
  - name: API/MCP concurrent requests (Pro)
    scope: account
    metric: concurrent_requests
    limit: 1
  - name: API/MCP concurrent requests (Studio)
    scope: account
    metric: concurrent_requests
    limit: 5
  - name: API/MCP concurrent requests (Enterprise)
    scope: contract
    metric: concurrent_requests
    limit: 'see contract'
  - name: Annual credit quota (Indie)
    scope: account
    metric: credits_per_year
    limit: 3000
    timeFrame: year
  - name: Annual credit quota (Pro)
    scope: account
    metric: credits_per_year
    limit: 12000
    timeFrame: year
  - name: Annual credit quota (Studio)
    scope: account
    metric: credits_per_year
    limit: 120000
    timeFrame: year
policies:
  - name: Concurrency-based throttling
    description: API and MCP access throttle by concurrent requests rather than per-second RPS.
  - name: Top-up credits
    description: Monthly plans can top up credits mid-cycle to avoid running out.
  - name: Refund window
    description: Annual plans have a 30-day refund window if fewer than 250 credits used (1,000 for Pro/Studio);
      monthly plans non-refundable.
  - name: Backoff
    description: On 429, retry with exponential backoff and respect Retry-After when present.
